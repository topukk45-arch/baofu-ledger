            $('themeBtn').addEventListener('click', openTheme);
            $('closeTheme').addEventListener('click', ()=>{ themeMask.style.display='none'; });

            $('applyCustomBtn').addEventListener('click', ()=>{
                const c=$('customColor').value;

            $('resetThemeBtn').addEventListener('click', ()=>{

                renderPresets(DEFAULT_PRIMARY);
            });

            // —— 启动时应用已保存的外观 ——
            const pf=loadPrefs();
            if(pf.primary) applyPrimary(pf.primary);
        })();

        // ===== 点击按下反馈：用事件委托给可点元素加 .pressed（WebView 里 :active 不稳，故用 JS）=====
        (function(){
            const SEL = 'button, .mini-btn, .link-btn, .cs-display, .dt-day, .dt-now, '
                      + '.pager button, .user-chip, .login-btn, .add-btn, .save, .cancel, '
                      + '.operate-btn, .logout, .cat-item button, .archive-bar select';
            let cur=null;
            function press(e){

            function release(){

            // 触摸优先；同时挂 pointer/mouse 兼容电脑与混合设备
            document.addEventListener('touchstart', press, {passive:true});

            document.addEventListener('touchcancel', release, {passive:true});
            document.addEventListener('pointerdown', press, {passive:true});
            document.addEventListener('pointerup', release, {passive:true});
            document.addEventListener('pointercancel', release, {passive:true});
            // 滚动时若手指离开按钮，确保还原
            document.addEventListener('scroll', release, {passive:true, capture:true});

        let statYear, statMonth;     // 当前查看的年/月（month: 0-11）
        let statSelDay=null;         // 当前选中的日（1-31）

        // 读取 CSS 变量当前值，让 SVG 颜色跟着外观走
        function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        // —— 统计页自带的颜色工具（独立于外观系统的私有函数，避免作用域报错） ——
        function statHexToRgb(h){ h=(h||'').replace('#',''); if(h.length===3)h=h.split('').map(c=>c+c).join('');
            if(h.length<6) h='d4af37';
            return { r:parseInt(h.slice(0,2),16), g:parseInt(h.slice(2,4),16), b:parseInt(h.slice(4,6),16) }; }
        function statRgbToHsl(r,g,b){ r/=255;g/=255;b/=255; const mx=Math.max(r,g,b),mn=Math.min(r,g,b); let h,s,l=(mx+mn)/2;
            if(mx===mn){h=s=0;}else{const d=mx-mn; s=l>0.5?d/(2-mx-mn):d/(mx+mn);
                switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;}
            return { h:h*360, s:s*100, l:l*100 }; }
        function statHslToHex(h,s,l){ h=(h%360+360)%360; s=Math.max(0,Math.min(100,s))/100; l=Math.max(0,Math.min(100,l))/100;
            const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2; let r,g,b;
            if(h<60)[r,g,b]=[c,x,0];else if(h<120)[r,g,b]=[x,c,0];else if(h<180)[r,g,b]=[0,c,x];
            else if(h<240)[r,g,b]=[0,x,c];else if(h<300)[r,g,b]=[x,0,c];else[r,g,b]=[c,0,x];
            const f=v=>Math.round(Math.max(0,Math.min(255,(v+m)*255))).toString(16).padStart(2,'0');
            return '#'+f(r)+f(g)+f(b); }

        // 为当月每个分类分配稳定颜色：基于主题色在色相环上均匀散开，保证跟随主题
        function catColor(idx, total){
            const base=cssVar('--c-primary')||'#d4af37';
            const {r,g,b}=statHexToRgb(base);
            const {h,s}=statRgbToHsl(r,g,b);
            const hue=(h + idx*(360/Math.max(total,1))) % 360;
            return statHslToHex(hue, Math.max(s,45), 50);
        }

        function statRecords(){
            // 统计基于当前存档的全部记录
            return getUserData().slice();
        }

        function renderStats(){
            if(statYear===undefined){
                const now=new Date();
                statYear=now.getFullYear(); statMonth=now.getMonth();
            }
            renderStatCalendar();
        }

        function renderStatCalendar(){
            $('statMonthLabel').textContent = `${statYear}年${pad(statMonth+1)}月`;
            const recs=statRecords();

            // 按「日」聚合当月净额，并记录哪天有数据
            const dayNet={}, dayHas={};
            recs.forEach(r=>{
                const d=new Date(r.time);
                if(d.getFullYear()===statYear && d.getMonth()===statMonth){
                    const day=d.getDate();
                    const amt=Number(r.money||0)*(r.type==='expense'?-1:1);
                    dayNet[day]=(dayNet[day]||0)+amt;
                    dayHas[day]=true;
                }
            });

            // 当月收入/支出汇总
            let mIn=0, mOut=0;
            recs.forEach(r=>{
                const d=new Date(r.time);
                if(d.getFullYear()===statYear && d.getMonth()===statMonth){
                    const amt=Number(r.money||0);
                    if(r.type==='expense') mOut+=amt; else mIn+=amt;
                }
            });
            $('statMonthIn').textContent='+'+mIn.toFixed(2);
            $('statMonthOut').textContent='−'+mOut.toFixed(2);

            // 画日历格子
            const firstDow=new Date(statYear, statMonth, 1).getDay();   // 0=周日
            const daysInMonth=new Date(statYear, statMonth+1, 0).getDate();
            const today=new Date();
            const isThisMonth = today.getFullYear()===statYear && today.getMonth()===statMonth;

            const grid=$('statCal'); grid.innerHTML='';
            for(let i=0;i<firstDow;i++){ grid.appendChild(document.createElement('div')); }
            for(let day=1; day<=daysInMonth; day++){
                const cell=document.createElement('div');
                cell.className='day';
                const has=!!dayHas[day];
                if(has) cell.classList.add('has');
                if(isThisMonth && today.getDate()===day) cell.classList.add('today');
                if(statSelDay===day && has) cell.classList.add('sel');

                let inner=`<div class="dn">${day}</div>`;
                if(has){
                    const n=dayNet[day];
                    const col = n>=0 ? 'var(--c-pos,#2f7d57)' : 'var(--c-neg,#d05a52)';
                    inner+=`<div class="da" style="color:${col}">${n>=0?'+':''}${n.toFixed(0)}</div>`;
                }
                cell.innerHTML=inner;
                if(has){
                    cell.addEventListener('click', ()=>{ statSelDay=day; renderStatCalendar(); renderStatDay(day); });
                }
                grid.appendChild(cell);
            }

            // 若已选中某天且该天仍在本月有数据，刷新当日分析；否则隐藏
            if(statSelDay && dayHas[statSelDay]){
                renderStatDay(statSelDay);
            } else {
                statSelDay=null;
                $('statDayWrap').style.display='none';
                $('statDayEmpty').style.display='block';
            }
        }

        function renderStatDay(day){
            const recs=statRecords().filter(r=>{
                const d=new Date(r.time);
                return d.getFullYear()===statYear && d.getMonth()===statMonth && d.getDate()===day;
            });
            $('statDayEmpty').style.display='none';
            $('statDayWrap').style.display='block';
            $('statDayTitle').textContent=`${statYear}-${pad(statMonth+1)}-${pad(day)} · 当日支出分析`;

            // —— 当日支出按分类聚合 ——
            const byCat={};
            recs.forEach(r=>{ if(r.type==='expense'){ const amt=Number(r.money||0); byCat[r.cat||'未分类']=(byCat[r.cat||'未分类']||0)+amt; } });
            const cats=Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]);
            const vals=cats.map(c=>byCat[c]);
            const colors=cats.map((_,i)=>catColor(i, cats.length));

            // 饼图：有支出就画占比；当天无支出则提示
            if(cats.length){
                $('statPie').innerHTML = buildDonutSVG(vals, colors);
                $('statCatList').innerHTML = cats.map((c,i)=>
                    `<div class="sc-item">
                        <span class="sc-name"><span class="sc-dot" style="background:${colors[i]}"></span>${escapeHtml(c)}</span>
                        <span class="sc-amt neg">−${byCat[c].toFixed(2)}</span>
                    </div>`).join('');
            } else {
                $('statPie').innerHTML = '<div style="font-size:12px;color:var(--c-text-soft);text-align:center;padding-top:54px;">当日无支出</div>';
                $('statCatList').innerHTML = '<div style="font-size:13px;color:var(--c-text-soft);">这天没有支出记录</div>';
            }

            // —— 当日按小时支出 ——
            const hours=new Array(24).fill(0);
            const hourRecs={};   // 小时 -> 该小时的支出记录数组
            recs.forEach(r=>{ if(r.type==='expense'){ const h=new Date(r.time).getHours(); hours[h]+=Number(r.money||0); (hourRecs[h]=hourRecs[h]||[]).push(r); } });
            renderHourBars(hours, hourRecs);
        }

        // 手写甜甜圈饼图
        function buildDonutSVG(vals, colors){
            const total=vals.reduce((a,b)=>a+b,0);
            if(total<=0) return '';
            const cx=70, cy=70, r=58, rin=33;
            let ang=-Math.PI/2;   // 从顶端开始
            let paths='';
            vals.forEach((v,i)=>{
                const frac=v/total;
                const a2=ang + frac*Math.PI*2;
                // 单一扇形若占满整圈，用两段避免 arc 退化
                if(frac>=0.9999){
                    paths+=`<circle cx="${cx}" cy="${cy}" r="${(r+rin)/2}" fill="none" stroke="${colors[i]}" stroke-width="${r-rin}"/>`;
                } else {
                    const x1=cx+r*Math.cos(ang),   y1=cy+r*Math.sin(ang);
                    const x2=cx+r*Math.cos(a2),    y2=cy+r*Math.sin(a2);
                    const xi2=cx+rin*Math.cos(a2), yi2=cy+rin*Math.sin(a2);
                    const xi1=cx+rin*Math.cos(ang),yi1=cy+rin*Math.sin(ang);
                    const large=frac>0.5?1:0;
                    paths+=`<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} L${xi2.toFixed(2)},${yi2.toFixed(2)} A${rin},${rin} 0 ${large} 0 ${xi1.toFixed(2)},${yi1.toFixed(2)} Z" fill="${colors[i]}"/>`;
                }
                ang=a2;
            });
            return `<svg viewBox="0 0 140 140" width="140" height="140" role="img" aria-label="当日支出分类占比">${paths}</svg>`;
        }

        // 手写柱状图（24 小时，可横向滚动，自动定位高峰，点击看该时段明细）
        let statHourRecs={};   // 供点击明细使用：小时 -> 记录数组
        function renderHourBars(hours, hourRecs){
            statHourRecs = hourRecs || {};
            const max=Math.max(...hours, 1);
            const colW=30, gap=6, padL=4, padBottom=22, padTop=8;
            const innerW=padL*2 + hours.length*colW + (hours.length-1)*gap;
            const H=170, plotH=H-padBottom-padTop;
            const barCol=cssVar('--c-primary')||'#d4af37';
            const emptyCol=cssVar('--c-chip')||'#fff5cc';
            const txtCol=cssVar('--c-text-soft')||'#888';
            const onBar=cssVar('--c-on-primary')||'#fff';

            let bars='';
            let peak=0, peakV=-1;
            hours.forEach((v,h)=>{ if(v>peakV){ peakV=v; peak=h; } });

            hours.forEach((v,h)=>{
                const x=padL + h*(colW+gap);
                const bh=v>0 ? Math.max(3, (v/max)*plotH) : 0;
                const y=padTop+plotH-bh;
                if(v>0){
                    // 整根柱子包一个可点击的 group
                    let cell=`<rect x="${x}" y="${y}" width="${colW}" height="${bh}" rx="4" fill="${barCol}"/>`;
                    const label=v.toFixed(0);
                    // 金额放进柱子内部（柱子够高时），否则放柱子上方
                    if(bh>=18){
                        cell+=`<text x="${x+colW/2}" y="${y+13}" text-anchor="middle" font-size="9" fill="${onBar}">${label}</text>`;
                    } else {
                        cell+=`<text x="${x+colW/2}" y="${y-3}" text-anchor="middle" font-size="9" fill="${txtCol}">${label}</text>`;
                    }
                    // 透明热区，扩大点击范围（含柱子上方空白），方便手指点
                    bars+=`<g style="cursor:pointer" onclick="showHourDetail(${h})">`
                        + `<rect x="${x}" y="${padTop}" width="${colW}" height="${plotH}" fill="transparent"/>`
                        + cell + `</g>`;
                } else {
                    bars+=`<rect x="${x}" y="${padTop+plotH-3}" width="${colW}" height="3" rx="1.5" fill="${emptyCol}"/>`;
                }
                bars+=`<text x="${x+colW/2}" y="${H-7}" text-anchor="middle" font-size="9" fill="${txtCol}">${h}</text>`;
            });

            $('statBarInner').innerHTML=
                `<svg viewBox="0 0 ${innerW} ${H}" width="${innerW}" height="${H}" role="img" aria-label="当日按小时支出，可横向滑动，点柱子看该时段明细">${bars}</svg>`;

            const peakHour = peakV>0 ? peak : null;
            $('statPeakHint').textContent = peakHour!==null
                ? `消费高峰在 ${peakHour}:00 前后`
                : '这天没有支出，无时间分布';

            // 自动滚动定位到高峰
            const scroll=$('statBarScroll');
            setTimeout(()=>{
                if(peakHour===null){ scroll.scrollLeft=0; return; }
                const center=padL + peakHour*(colW+gap) + colW/2;
                scroll.scrollLeft=Math.max(0, center - scroll.clientWidth/2);
            }, 30);
        }

        // 点击某个时段的柱子，弹出该小时的消费明细（时间 / 分类 / 金额）
        window.showHourDetail=function(h){
            const list=(statHourRecs[h]||[]).slice()
                .sort((a,b)=>new Date(a.time)-new Date(b.time));
            if(!list.length) return;
            const rows=list.map(r=>{
                const t=r.time.replace('T',' ').slice(11,16);
                const amt=Number(r.money||0);
                return `<div class="hd-row">`
                    + `<span class="hd-time">${t}</span>`
                    + `<span class="cat-tag">${escapeHtml(r.cat||'未分类')}</span>`
                    + `<span class="hd-amt neg">−${amt.toFixed(2)}</span>`
                    + `</div>`;
            }).join('');
            const sum=list.reduce((s,r)=> s + (r.type==='expense' ? Number(r.money||0) : 0), 0);
            const html=`<div class="hd-list">${rows}</div>`
                + `<div class="hd-sum">该时段合计支出 <b class="neg">−${sum.toFixed(2)}</b> 元</div>`;
            customAlert(html, `${pad(h)}:00 – ${pad(h)}:59 消费明细`, 'left', true);
        };

        // 统计页月份切换
        $('statPrevM').addEventListener('click', ()=>{
            statMonth--; if(statMonth<0){ statMonth=11; statYear--; }
            statSelDay=null; renderStatCalendar();
        });
        $('statNextM').addEventListener('click', ()=>{
            statMonth++; if(statMonth>11){ statMonth=0; statYear++; }
            statSelDay=null; renderStatCalendar();
        });

        // ===== 年月选择器 =====
        (function(){
            const mask=$('ymMask'), grid=$('ymGrid'), yearLabel=$('ymYearLabel');
            let pickYear;   // 选择器里临时浏览的年份

            // 找出某年里有记账记录的月份集合（用于打点标记）
            function monthsWithData(year){
                const set=new Set();
                statRecords().forEach(r=>{
                    const d=new Date(r.time);
                    if(d.getFullYear()===year) set.add(d.getMonth());
                });
                return set;
            }
            function paint(){
                yearLabel.textContent=pickYear;
                const has=monthsWithData(pickYear);
                const now=new Date();
                grid.innerHTML='';
                for(let m=0;m<12;m++){
                    const b=document.createElement('button');
                    b.textContent=(m+1)+'月';
                    if(pickYear===statYear && m===statMonth) b.classList.add('cur');
                    if(has.has(m)) b.classList.add('has');
                    b.onclick=()=>{
                        statYear=pickYear; statMonth=m; statSelDay=null;
                        mask.style.display='none'; renderStatCalendar();
                    };
                    grid.appendChild(b);
                }
            }
            function open(){ pickYear=statYear; paint(); mask.style.display='flex'; }

            $('statMonthLabel').addEventListener('click', open);
            $('ymPrevY').addEventListener('click', ()=>{ pickYear--; paint(); });
            $('ymNextY').addEventListener('click', ()=>{ pickYear++; paint(); });
            $('ymCancel').addEventListener('click', ()=>{ mask.style.display='none'; });
            $('ymToCurrent').addEventListener('click', ()=>{
                const now=new Date();
                statYear=now.getFullYear(); statMonth=now.getMonth(); statSelDay=null;
                mask.style.display='none'; renderStatCalendar();
            });
        })();

        // ===== 页面初始化：若上次已登录且未退出，自动进入主界面；否则显示登录页 =====
        (function initApp(){
            const remembered=localStorage.getItem('app_logged_in_user');
            if(remembered && localStorage.getItem(`store_${remembered}`)!==null){
                login(remembered);   // 自动登录，按设置进入默认页
            } else {
                if(remembered) localStorage.removeItem('app_logged_in_user');
                document.body.classList.add('login-mode');
                renderRecentUsers();
            }
        })();

    </script>

</body>
</html>
